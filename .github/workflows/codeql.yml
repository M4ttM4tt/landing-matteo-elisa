name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Third-party, minified vendored code — exclude from analysis.
          config: |
            paths-ignore:
              - src/dc-runtime.js
              - src/vendor

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
